<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal</title>

    <style>
        /* Navigation Bar */
        nav {
            background-color: #0047AB;
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        /* Heading */
        h1 {
            text-align: center;
            color: #0047AB;
        }

        /* Image Styling */
        .event-image {
            width: 220px;
            height: 150px;
            border: 3px solid blue;
            border-radius: 8px;
        }

        table {
            border-collapse: collapse;
            margin: auto;
            text-align: center;
        }

        td {
            padding: 15px;
        }

        caption {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #0047AB;
        }
    </style>

</head>

<body>

    <!-- Navigation -->
    <header>
        <nav>
            <a href="home.html" target="_blank">Home</a>
            <a href="events.html" target="_blank">Events</a>
            <a href="contact.html" target="_blank">Contact</a>
            <a href="help.html" target="_blank">Help</a>
        </nav>
    </header>

    <h1>Community Event Gallery</h1>

    <table border="1">

        <caption>Photos from Previous Community Events</caption>

        <!-- Row 1 -->
        <tr>

            <td>
                <img src="event1.jpg" alt="Tree Plantation" title="Tree Plantation Drive" class="event-image">
                <br><br>
                <b>Tree Plantation Drive</b>
            </td>

            <td>
                <img src="event2.jpg" alt="Health Camp" title="Health Awareness Camp" class="event-image">
                <br><br>
                <b>Health Awareness Camp</b>
            </td>

            <td>
                <img src="event3.jpg" alt="Cultural Festival" title="Cultural Festival" class="event-image">
                <br><br>
                <b>Cultural Festival</b>
            </td>

        </tr>

        <!-- Row 2 -->
        <tr>

            <td>
                <img src="event4.jpg" alt="Sports Meet" title="Community Sports Meet" class="event-image">
                <br><br>
                <b>Community Sports Meet</b>
            </td>

            <td>
                <img src="event5.jpg" alt="Clean-up Drive" title="Community Clean-up Drive" class="event-image">
                <br><br>
                <b>Community Clean-up Drive</b>
            </td>

            <td>
                <img src="event6.jpg" alt="Workshop" title="Skill Development Workshop" class="event-image">
                <br><br>
                <b>Skill Development Workshop</b>
            </td>

        </tr>

    </table>

    <footer style="text-align:center; margin-top:30px;">
        <p>&copy; 2026 Local City Council. All Rights Reserved.</p>
    </footer>

</body>

</html>
